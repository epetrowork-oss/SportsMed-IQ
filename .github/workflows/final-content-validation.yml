name: Final content validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    if: github.head_ref == 'chatgpt/content-accuracy-fixes-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:content
      - run: npm run audit:content
      - run: npm run build
