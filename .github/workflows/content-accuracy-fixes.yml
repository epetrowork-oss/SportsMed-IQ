name: Apply content accuracy fixes

on:
  push:
    branches:
      - chatgpt/content-accuracy-fixes-v2
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/content-accuracy-fixes-v2
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply approved GPT-ready wording fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('src/content/units')

          def replace_if_present(path, old, new):
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count:
                  path.write_text(text.replace(old, new), encoding='utf-8')
              print(f'{path}: {count} x {old!r}')
              return count

          replace_if_present(root / 'knee-acl-adv.json', 'The 2-8x higher ACL injury rate', 'The roughly 2-6x higher ACL injury rate')
          replace_if_present(root / 'hydration-nutrition.json', 'Caffeine is a mild diuretic and energy drinks are not designed or tested for use during exercise.', 'Caffeine can have a small diuretic effect, but that effect is minor and largely offset during exercise; energy drinks are not designed or tested for use during exercise.')

          nose_files = [
              root / 'dental-facial-trauma-ms.json',
              root / 'dental-facial-trauma.json',
              root / 'wound-care-ms.json',
              root / 'wound-care.json',
              root / 'wound-care-adv.json',
          ]
          variants = [('10-15 minutes', '10 minutes'), ('10–15 minutes', '10 minutes'), ('15-20 minutes', '10 minutes'), ('15–20 minutes', '10 minutes')]
          nose_changes = 0
          for path in nose_files:
              if not path.exists():
                  print(f'{path}: missing, skipped')
                  continue
              lines = path.read_text(encoding='utf-8').splitlines(keepends=True)
              out, recent = [], []
              for line in lines:
                  context = ' '.join(recent[-5:] + [line]).lower()
                  new_line = line
                  if any(term in context for term in ('nosebleed', 'epistaxis', 'pinch the soft part of the nose', 'pinching the soft part of the nose')):
                      for old, new in variants:
                          nose_changes += new_line.count(old)
                          new_line = new_line.replace(old, new)
                  out.append(new_line)
                  recent.append(line)
              path.write_text(''.join(out), encoding='utf-8')
          print(f'nosebleed replacements: {nose_changes}')

          replace_if_present(root / 'heat-illness-adv.json', 'a dry 98°F day', 'a dry 95°F day')
          replace_if_present(root / 'warmup-injury-prevention-adv.json', 'about 2-4°F', 'about 2-3.5°F')
          replace_if_present(root / 'warmup-injury-prevention-adv.json', 'about 2–4°F', 'about 2–3.5°F')

          path = root / 'wound-care-adv.json'
          replace_if_present(path, "'High and tight' means placing the tourniquet as close to the junction of the limb and torso as possible (not directly over the wound), never over a joint, and applying it over clothing if needed rather than losing time undressing the injury.", "Place the tourniquet 2-3 inches above the wound (closer to the torso), never over a joint. If the wound cannot be seen or measured quickly in an active-threat or untrained emergency, place it 'high and tight' near the top of the limb. Apply it over clothing if needed rather than losing time undressing the injury.")
          replace_if_present(path, 'It goes high and tight above the wound, never over it, and is never loosened or removed in the field once applied;', "Place it 2-3 inches above the wound and never over a joint; use 'high and tight' only when the wound cannot be seen or measured quickly in an active-threat or untrained emergency, and never loosen or remove it in the field once applied;")
          replace_if_present(path, 'High and tight, above the wound, never over a joint; tighten until bleeding fully stops and the distal pulse disappears; note the application time; never loosen or remove in the field once applied.', "Place 2-3 inches above the wound, never over a joint; use 'high and tight' only when the wound cannot be seen or measured quickly in an active-threat or untrained emergency; tighten until bleeding fully stops and the distal pulse disappears; note the application time; never loosen or remove in the field once applied.")

          replace_if_present(root / 'heat-illness.json', 'core temperature drops to about 102°F', 'core temperature drops to about 100-102°F')
          replace_if_present(root / 'heat-illness.json', 'core temp ~102°F', 'core temp about 100-102°F')

          checks = {
              root / 'knee-acl.json': ['roughly 2–6 times', 'roughly 2–6 times the male rate', 'Roughly 2–6×'],
              root / 'knee-acl-adv.json': ['roughly 2-6x higher ACL injury rate'],
              root / 'hydration-nutrition.json': ['effect is minor and largely offset during exercise'],
              root / 'heat-illness-adv.json': ['a dry 95°F day', 'Stop active cooling around 100-102°F'],
              root / 'warmup-injury-prevention-adv.json': ['about 2-3.5°F', 'about 2–3.5°F'],
              root / 'wound-care-adv.json': ['2-3 inches above the wound', "use 'high and tight' only"],
              root / 'heat-illness.json': ['about 100-102°F'],
          }
          for path, alternatives in checks.items():
              text = path.read_text(encoding='utf-8')
              if not any(value in text for value in alternatives):
                  raise SystemExit(f'{path}: expected corrected wording not found')

          Path('.github/workflows/content-accuracy-fixes.yml').unlink()
          PY

      - name: Validate content
        run: npm ci && npm run validate:content

      - name: Audit content
        run: npm run audit:content

      - name: Build
        run: npm run build

      - name: Commit approved fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/units .github/workflows/content-accuracy-fixes.yml
          git diff --cached --check
          git diff --cached --name-only | grep -Ev '^(PLAN.md|docs/CONTENT-REVIEW.md|docs/STANDARDS-VERIFICATION.md)$'
          git commit -m "Apply approved content accuracy fixes"
          git push origin HEAD:chatgpt/content-accuracy-fixes-v2
