name: Refine safety wording

on:
  pull_request:
    branches:
      - main
\permissions:
  contents: write

jobs:
  refine-wording:
    if: github.head_ref == 'chatgpt/content-accuracy-fixes-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/content-accuracy-fixes-v2
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Refine approved safety wording
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_exact(path, old, new, expected=1):
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f'{path}: expected {expected} occurrence(s), found {count}')
              path.write_text(text.replace(old, new), encoding='utf-8')

          wound = Path('src/content/units/wound-care-adv.json')
          replace_exact(
              wound,
              "Place the tourniquet 2-3 inches above the wound (closer to the torso), never over a joint. If the wound cannot be seen or measured quickly in an active-threat or untrained emergency, place it 'high and tight' near the top of the limb. Apply it over clothing if needed rather than losing time undressing the injury.",
              "When the bleeding wound can be clearly identified, place the tourniquet 2-3 inches above the wound, toward the torso, and never directly over a joint. If the wound cannot be located quickly or the situation does not permit deliberate placement, apply the tourniquet 'high and tight' near the top of the injured limb. Apply it over clothing if needed rather than losing time undressing the injury.",
          )
          replace_exact(
              wound,
              "Place it 2-3 inches above the wound and never over a joint; use 'high and tight' only when the wound cannot be seen or measured quickly in an active-threat or untrained emergency, and never loosen or remove it in the field once applied;",
              "When the wound can be clearly identified, place it 2-3 inches above the wound and never directly over a joint; if the wound cannot be located quickly or the situation does not permit deliberate placement, apply it 'high and tight' near the top of the injured limb; never loosen or remove it in the field once applied;",
          )
          replace_exact(
              wound,
              "Place 2-3 inches above the wound, never over a joint; use 'high and tight' only when the wound cannot be seen or measured quickly in an active-threat or untrained emergency;",
              "When the wound is clearly identified, place 2-3 inches above it and never directly over a joint; if the wound cannot be located quickly or the situation does not permit deliberate placement, apply 'high and tight' near the top of the injured limb;",
          )

          heat = Path('src/content/units/heat-illness.json')
          replace_exact(
              heat,
              "Call 911, get the athlete into a cold water immersion tub (or rotate ice-water-soaked towels over the whole body if no tub exists), remove equipment, and keep cooling until emergency medical services arrive or core temperature drops to about 100-102°F. Cool FIRST, transport SECOND. Never give fluids to a confused or unconscious athlete.",
              "Call 911, get the athlete into a cold water immersion tub (or rotate ice-water-soaked towels over the whole body if no tub exists), remove equipment, and continue active cooling while a qualified medical professional monitors rectal core temperature. Stop active cooling when core temperature reaches about 100-102°F, or when EMS assumes responsibility for continued cooling and care. Cool FIRST, transport SECOND. Never give fluids to a confused or unconscious athlete.",
          )
          replace_exact(
              heat,
              "Cool FIRST, transport SECOND: call 911 and start immediate cold water immersion; keep cooling until EMS arrives or core temp about 100-102°F.",
              "Cool FIRST, transport SECOND: call 911 and start immediate cold water immersion; continue cooling until rectal core temperature reaches about 100-102°F or EMS assumes responsibility for continued cooling and care.",
          )

          Path('.github/workflows/refine-safety-wording.yml').unlink()
          PY

      - name: Validate content
        run: npm ci && npm run validate:content

      - name: Audit content
        run: npm run audit:content

      - name: Build
        run: npm run build

      - name: Commit refined wording
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/units/wound-care-adv.json src/content/units/heat-illness.json .github/workflows/refine-safety-wording.yml
          git diff --cached --check
          git commit -m "Refine tourniquet and heat-stroke wording"
          git push origin HEAD:chatgpt/content-accuracy-fixes-v2
